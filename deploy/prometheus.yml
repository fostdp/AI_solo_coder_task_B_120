global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    monitor: 'crossbow-monitor'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'crossbow-backend'
    static_configs:
      - targets: ['backend:9090']
    metrics_path: /metrics
    scheme: http

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
