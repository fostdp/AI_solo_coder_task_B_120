# 监听配置
listener 1883
protocol mqtt

listener 9001
protocol websockets

# 持久化
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# 日志级别
log_type error
log_type warning
log_type notice
log_type information

# 连接设置
max_connections -1
keepalive_interval 60

# 匿名访问（开发环境）
allow_anonymous true

# 主题权限
acl_file /mosquitto/config/aclfile
